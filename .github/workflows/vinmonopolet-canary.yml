name: Vinmonopolet Fetch Canary

on:
  schedule:
    # 05:00 UTC — runs 1h after Build & Deploy's 04:00 UTC cron
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

# Shared with the build job of build-deploy.yml so fetch runs serialize.
concurrency:
  group: vinmonopolet-fetch
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # Any failure (network, API schema change, inconsistent windows from
      # _assert_consistent_windows, etc.) goes red in the Actions tab.
      # PR 2 will wire up Discord alerting on two-in-a-row failures.
      - name: Fetch Vinmonopolet (canary)
        run: python scripts/fetch_vinmonopolet.py
