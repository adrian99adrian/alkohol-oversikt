name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 04:00 UTC — keeps Vinmonopolet hours fresh
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # 1. Generate calendar (holidays + day types)
      - name: Build calendar
        run: python scripts/build_calendar.py

      # 2. Fetch Vinmonopolet store hours from API
      - name: Fetch Vinmonopolet
        run: python scripts/fetch_vinmonopolet.py

      # 3. Calculate per-municipality sales times
      - name: Build municipalities
        run: python scripts/build_municipality.py --all

      # 4. Validate all generated data
      - name: Validate data
        run: python scripts/validate_data.py

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      # 5. Build static site
      - name: Build site
        run: npm run build
        working-directory: web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac553fd0d28 # v4
