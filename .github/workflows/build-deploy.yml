name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Daily at 04:00 UTC — keeps Vinmonopolet hours fresh
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Shared with vinmonopolet-canary.yml so fetch runs serialize.
    concurrency:
      group: vinmonopolet-fetch
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      # 1. Generate calendar (holidays + day types)
      - name: Build calendar
        run: python scripts/build_calendar.py

      # 2. Fetch Vinmonopolet store hours from API
      #    continue-on-error: if the API is down, the pipeline can still
      #    build from checked-in vinmonopolet.json. The warning step below
      #    alerts when this happens. Note: validate_data.py checks schema
      #    but does not detect stale fetched_at dates.
      - name: Fetch Vinmonopolet
        id: fetch-vinmonopolet
        run: python scripts/fetch_vinmonopolet.py
        continue-on-error: true

      - name: Warn on Vinmonopolet fetch failure
        if: steps.fetch-vinmonopolet.outcome == 'failure'
        run: echo "::warning::Vinmonopolet API fetch failed — deploying with cached store hours from checked-in vinmonopolet.json"

      # 3. Calculate per-municipality sales times
      - name: Build municipalities
        run: python scripts/build_municipality.py --all

      # 4. Validate all generated data
      - name: Validate data
        run: python scripts/validate_data.py

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      # 5. Build static site
      - name: Build site
        run: npm run build
        working-directory: web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
